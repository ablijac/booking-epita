name: security

on: workflow_dispatch

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  osv-scanner:
    name: run osv-scanner
    runs-on: ubuntu-latest
    steps:
      - name: run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisFull.sarif
            ./
        continue-on-error: true